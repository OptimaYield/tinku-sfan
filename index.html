<!DOCTYPE html>
<html lang="en">
<head>

<body class="login-body">

<div class="overlay"></div>

<div class="petals"></div>

<div class="floating-text">
<span>Assalamualaikum 🌙</span>
<span>Tinku Purkait ❤️</span>

</p>

</div>

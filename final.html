<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Final Proposal</title>

<link rel="stylesheet"
href="style.css">

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

</head>

<body>

<section class="page">

<div class="final-box">

<h1>
Tinku Purkait ❤️
</h1>

<p style="font-size:24px;
line-height:2;
max-width:900px;
margin:auto;
color:#ddd;">

I know this is unusual.

Maybe unexpected too.

But sometimes...

the heart quietly chooses
someone beautiful
without asking permission.

And mine chose you 🌙

</p>

<button class="accept-btn"
onclick="acceptLove()">

YES, I ACCEPT ❤️

</button>

</div>

</section>

<audio autoplay loop>
<source src="https://cdn.pixabay.com/audio/2022/08/04/audio_fc5d8b4a8f.mp3" type="audio/mp3">
</audio>

<script>

function acceptLove(){

confetti({
particleCount:500,
spread:360,
origin:{y:0.6}
});

setInterval(() => {

confetti({
particleCount:200,
spread:360
});

},1500);

document.body.innerHTML += `

<div style="
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background:rgba(0,0,0,.7);
backdrop-filter:blur(10px);
z-index:9999;
">

<h1 style="
font-size:70px;
color:#ff4d6d;
text-align:center;
">

She Accepted ❤️

</h1>

<p style="
font-size:24px;
margin-top:20px;
color:white;
">

Congratulations Sottojit ✨

</p>

</div>

`;

setTimeout(()=>{

window.open(
"https://wa.me/8801404579502?text=Tinku accepted your proposal ❤️",
"_blank"
);

},3000);

}

</script>

</body>
</html>

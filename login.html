<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Love Proposal – Tinku Purkait</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
      user-select: none;
    }
    body {
      background: #000;
      color: #fff;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      position: relative;
    }
    .bg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 50% 50%, #220, #000);
      opacity: 0.8;
      z-index: -1;
    }
    .petal {
      position: absolute;
      top: -20px;
      color: #ff0055;
      font-size: 24px;
      opacity: 0.3;
      animation: fall linear infinite;
    }
    .ring {
      position: absolute;
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: 2px solid #ff0055;
      opacity: 0.6;
      animation: ring-grow linear 6s infinite;
    }
    .intro-text {
      position: absolute;
      top: 40vh;
      text-align: center;
      font-size: 1.8em;
      font-weight: 500;
      letter-spacing: 1px;
    }
    .intro-text span {
      color: #ff0055;
      font-weight: 700;
    }
    .login-box {
      position: relative;
      z-index: 10;
      padding: 30px 40px;
      margin-top: 20vh;
      background: rgba(0, 0, 0, 0.75);
      border-radius: 15px;
      border: 1px solid #ff0055;
      backdrop-filter: blur(10px);
      box-shadow: 0 0 30px rgba(255, 0, 85, 0.3);
    }
    .login-title {
      margin-bottom: 10px;
      text-align: center;
      font-size: 1.4em;
      color: #ff0055;
    }
    .input-group {
      margin-bottom: 15px;
      text-align: left;
    }
    .input-label {
      display: block;
      font-size: 0.9em;
      margin-bottom: 5px;
      color: #ccc;
    }
    .input-field {
      width: 100%;
      padding: 10px 12px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid #ff0055;
      border-radius: 6px;
      color: #fff;
      font-size: 0.95em;
    }
    .input-field::placeholder {
      color: #999;
    }
    .btn {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      background: #ff0055;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 0.95em;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn:hover {
      background: #ff3377;
      transform: scale(1.02);
    }
    .otp-group {
      margin-top: 15px;
      display: none; /* hidden by default */
    }
    .otp-code {
      font-size: 1.2em;
      display: inline-block;
      margin: 0 10px;
      padding: 8px 12px;
      background: #000;
      border: 1px solid #ff0055;
      border-radius: 6px;
      color: #ff0055;
      text-align: center;
      min-width: 40px;
    }
    .otp-fail {
      color: #ff0055;
      margin-top: 10px;
      font-size: 0.8em;
      text-align: center;
      display: none;
    }
    .otp-success {
      color: #00ff99;
      margin-top: 10px;
      font-size: 0.8em;
      text-align: center;
      display: none;
    }
    @keyframes fall {
      to { transform: translateY(100vh); }
    }
    @keyframes ring-grow {
      0% { transform: scale(0); opacity: 0; }
      50% { transform: scale(1.2); opacity: 0.8; }
      100% { transform: scale(0); opacity: 0; }
    }
    @media (max-width: 500px) {
      .login-box {
        padding: 20px;
        margin-top: 10vh;
      }
      .intro-text {
        font-size: 1.3em;
      }
    }
  </style>
</head>
<body>
  <div class="bg"></div>

  <!-- Petals & Rings -->
  <script>
    for (let i = 0; i < 50; i++) {
      const p = document.createElement("div");
      p.textContent = "🌹";
      p.className = "petal";
      p.style.left = Math.random() * 100 + "vw";
      p.style.opacity = 0.2 + Math.random() * 0.4;
      p.style.animationDuration = 8 + Math.random() * 4 + "s";
      document.body.appendChild(p);
    }
    for (let i = 0; i < 8; i++) {
      const r = document.createElement("div");
      r.className = "ring";
      r.style.left = Math.random() * 80 + 10 + "vw";
      r.style.top = Math.random() * 80 + 10 + "vh";
      r.style.opacity = 0.2 + Math.random() * 0.4;
      document.body.appendChild(r);
    }
  </script>

  <!-- Main Text -->
  <div class="intro-text">
    Assalamualaikum …<br />
    আমি তোমাকে ❤️ করি, <span>Tinku Purkait</span>
  </div>

  <!-- Login Box -->
  <div class="login-box">
    <div class="login-title">Enter your beautiful world</div>

    <div class="input-group">
      <div class="input-label">Name</div>
      <input type="text" class="input-field" value="Tinku Purkait" readonly />
    </div>

    <div class="input-group">
      <div class="input-label">Password (4‑digit)</div>
      <input
        type="text"
        id="passInput"
        class="input-field"
        maxlength="4"
        placeholder="xxxx"
      />
    </div>

    <button class="btn" id="passBtn">Log in</button>

    <!-- OTP Verification Group -->
    <div class="otp-group" id="otpGroup">
      <div class="input-label">Two‑Step Verification (OTP)</div>
      <div class="otp-code" id="codeDisplay">1234</div>
      <div class="input-group">
        <input
          type="text"
          id="otpInput"
          class="input-field"
          maxlength="4"
          placeholder="Enter code"
        />
      </div>
      <div class="otp-fail" id="otpFail">Wrong code. Try again.</div>
      <div class="otp-success" id="otpSuccess">Verified!</div>
      <button class="btn" id="otpBtn">Verify</button>
    </div>
  </div>

  <script>
    // Step 1: Check password
    const correctPass = "1135"; // 4‑digit

    function generateRandomCode() {
      return Math.floor(1000 + Math.random() * 9000).toString();
    }

    document.getElementById("passBtn").onclick = function () {
      const pass = document.getElementById("passInput").value.trim();
      if (pass === correctPass) {
        document.getElementById("otpGroup").style.display = "block";
        document.getElementById("codeDisplay").textContent = generateRandomCode();
      } else {
        alert("Password doesn't match. Please try again.");
      }
    };

    // Step 2: Fake OTP (no real backend)
    document.getElementById("otpBtn").onclick = function () {
      const code = document.getElementById("codeDisplay").textContent;
      const otp = document.getElementById("otpInput").value.trim();
      const otpFail = document.getElementById("otpFail");
      const otpSuccess = document.getElementById("otpSuccess");

      otpFail.style.display = "none";
      otpSuccess.style.display = "none";

      if (otp === code) {
        otpSuccess.style.display = "block";
        setTimeout(() => {
          window.location.href = "intro.html"; // go to intro
        }, 1200);
      } else {
        otpFail.style.display = "block";
        document.getElementById("otpInput").value = "";
      }
    };
  </script>
</body>
</html>
